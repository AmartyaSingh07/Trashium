<svg xmlns="http://www.w3.org/2000/svg" width="260" height="180" viewBox="-112.3 0 906.6 628" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="trashium-primary-animated-title trashium-primary-animated-desc" focusable="false">
<title id="trashium-primary-animated-title">Trashium primary logo animated</title>
<desc id="trashium-primary-animated-desc">Animated primary logo with transparent canvas, clean wordmark A leaf accent, and CSS-only entrance animation.</desc>
<style>
:root{--espresso:#2A2218;--sage:#8FA57E;--copper:#C2793D;--cream:#F4EFE3;}
.espresso{fill:#2A2218;}
.sage{fill:#8FA57E;}
.copper{fill:#C2793D;}
.cream{fill:#F4EFE3;}
@supports (fill:var(--espresso)){
  .espresso{fill:var(--espresso);}
  .sage{fill:var(--sage);}
  .copper{fill:var(--copper);}
  .cream{fill:var(--cream);}
}

#trashium-primary-animated-loop-reveal-path{fill:none;stroke:#fff;stroke-width:170;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1550;stroke-dashoffset:1550;animation:loopDraw 1.35s cubic-bezier(.42,0,.16,1) forwards;}
#trashium-primary-animated-loop{mask:url(#trashium-primary-animated-loop-reveal);}
.trashium-primary-animated-stage{opacity:0;transform-box:fill-box;transform-origin:center;animation:fadeRise .48s cubic-bezier(.2,.7,.2,1) forwards;}
#trashium-primary-animated-t{animation-delay:.86s;}
#trashium-primary-animated-hand{animation-delay:1.05s;}
#trashium-primary-animated-bin{animation-delay:1.22s;}
#trashium-primary-animated-wordmark{animation-delay:1.48s;}
@keyframes loopDraw{to{stroke-dashoffset:0;}}
@keyframes fadeRise{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:translateY(0) scale(1);}}
@media (prefers-reduced-motion:reduce){#trashium-primary-animated-loop-reveal-path,.trashium-primary-animated-stage{animation:none!important;opacity:1!important;transform:none!important;}#trashium-primary-animated-loop-reveal-path{stroke-dashoffset:0!important;}}
</style>
