.espresso{fill:#2A2218;}
.sage{fill:#8FA57E;}
.copper{fill:#C2793D;}
.cream{fill:#F4EFE3;}
@supports (fill:var(--espresso)){
  .espresso{fill:var(--espresso);}
  .sage{fill:var(--sage);}
  .copper{fill:var(--copper);}
  .cream{fill:var(--cream);}
}
</style>

